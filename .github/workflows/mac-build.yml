name: Build Mac App

on:
  push:
    branches:
      - main # Pokreće se na svaki tvoj običan 'git push' na main granu
    tags:
      - 'v*' # Pokreće se kada napraviš novu verziju (npr. v1.0.1)
  workflow_dispatch: # Pokreće se na tvoju akciju (ručno klikom na "Run workflow" dugme na GitHub-u)

jobs:
  build-mac:
    runs-on: macos-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      - name: Install dependencies
        run: npm install

      - name: Build and Publish Mac App
        run: npm run electron:build:mac -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Restless-Mac-App
          path: |
            release/*.dmg
            release/*.zip